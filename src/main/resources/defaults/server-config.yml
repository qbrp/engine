server: "default"
require_identical_namespaces: false

chat:
  channels:
    local:
      name: <white>Разговор
      format: "{author_name} {acoustic_separator} {acoustic_text}"
      acoustic:
        distort: true
      speech: true
      heads: true

    global:
      name: <#8986FF>Глобальный OOC
      format: "[G] {author_name} ▸ {text}"
      global: true
      prefix: "!"
      heads: true

  commands:
    me:
      name: <green>Действие
      aliases: ["action"]
      format: "{author_name} <yellow>*</yellow> {text}"
      distance: 24
      regex:
        exp: '^\*\*.*\*\*$'
        remove: '\*\*'
      heads: true

  placeholders:
    acoustic_separator: "<{separator_color}>▸</{separator_color}>"
    acoustic_text: "<{color}>{bold1|}{text}{bold2|}</{color}>"

  default-channel: "local"
  pm: "{author_name} -> {recipient_name} ▸ {text}"

  acoustic:
    passability:
      solid: 0.01
      partial: 0.9
      air: 1
      tags:
        "minecraft:doors": 0.7
    formatting:
      - volume: 0.0
        multiplier: 0.5
        input_placeholders:
          separator_color: "yellow"
        output_placeholders:
          color: '#555555'
      - volume: 0.1
        multiplier: 0.7
        input_placeholders:
          separator_color: "yellow"
        output_placeholders:
          color: '#AAAAAA'
      - volume: 0.3
        input_placeholders:
          separator_color: "gray"
        output_placeholders:
          color: "#FFFFFF"
      - volume: 0.55
        input_placeholders:
          separator_color: "red"
        output_placeholders:
          color: "red"
      - volume: 1
        input_placeholders:
          separator_color: "dark_red"
        output_placeholders:
          color: "red"
          bold1: "<bold>"
        bold2: "</bold>"
    distortion:
      threshold: 0.3
      artifacts: [ '-', '~' ]
    simulation:
      range: 24
      performance-debug: false
      rebuild-debug: false
    volume:
      max: 10
      hearing-threshold: 0.09
      attenuation: 0.9

  join:
    enabled: false
    message: ""
  leave:
    enabled: false
    message: ""
  advancements: false

player:
  spectate_on_join: true
  volume:
    min: 0.2
    base: 0.5
    max: 1.2
  attributes:
    default:
      speed: 0.12
      jump-strength: 0.45
    gm:
      speed: 0.24
      jump-strength: 0.45
    spectator:
      speed: 0.15
  damage: false

vocal:
  # При каком значении усталости возможно сорвать голос
  break_threshold: 0.3
  # Шанс сорвать голос при максимальной усталости
  break_chance: 0.1
  # Время восстановления голоса при срыве в секундах
  regeneration_time: 700
  # Случайный разброс времени
  regeneration_random: 0.5

  # Выше какой громкости голосовой аппарат начинает уставать
  tiredness_threshold: 0.6
  # Усиление усталости голоса при полной громкости (до 1)
  tiredness_gain: 0.125
  # Уменьшение усталости голоса в секунду (при 0.33 выходит 600 секунд, примерно 10 минут)
  tiredness_decrease_rate: 0.0033

movement:
  # Множитель скорости в режиме бега
  sprint_multiplier: 1.5
  # Множитель к показателю аттрибута скорости, определяющий самую низкую возможную скорость (от 0 до 1)
  min_speed_factor: 0.05
  # Минимально возможная скорость при беге, работает как минимальный ограничитель множителя регулируемой игроком скорости
  min_speed_multiplier_sprint_factor: 0.3

  stamina: true
  jump_stamina_consume: 0.25
  # Уменьшение стамины за 1 минуту при максимальной скорости
  stamina_consumption: 5.3
  # Постоянное (!) восстановление стамины за 1 минуту. Стамина тратится, когда потребление становится больше регенерации
  stamina_regen: 5.6
  # Порог стамины, при котором персонаж начинает замедляться
  slowdown_stamina_threshold: 0.3

  # Как сильно скорость, регулируемая игроков, влияет на реальную скорость персонажа (по сути, ограничитель)
  intention_effect: 0.7

item_autosave_period: 120